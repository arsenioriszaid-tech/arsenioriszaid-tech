<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" width="700" height="160">
  <!-- Background -->
  <rect width="700" height="160" fill="#0A0A0A" rx="8" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" fill="#D97706" opacity="0.4" rx="2"/>
  
  <!-- Quote-style about -->
  <text x="30" y="35" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#D97706" letter-spacing="1">
    <tspan fill="#D97706">"</tspan>
    <tspan fill="#9CA3AF">A developer who believes the best interfaces are invisible — </tspan>
  </text>
  <text x="30" y="55" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#9CA3AF">
    where form and function merge into something that just works.
    <tspan fill="#D97706">"</tspan>
  </text>
  
  <!-- Divider -->
  <line x1="30" y1="75" x2="670" y2="75" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Description -->
  <text x="30" y="98" font-family="'SF Mono', monospace" font-size="11" fill="#666666">
    <tspan fill="#D97706">➜</tspan> <tspan fill="#888888">I build pixel-perfect, performant web experiences</tspan>
  </text>
  <text x="30" y="116" font-family="'SF Mono', monospace" font-size="11" fill="#666666">
    <tspan fill="#D97706">➜</tspan> <tspan fill="#888888">Passionate about motion, accessibility, and craft</tspan>
  </text>
  <text x="30" y="134" font-family="'SF Mono', monospace" font-size="11" fill="#666666">
    <tspan fill="#D97706">➜</tspan> <tspan fill="#888888">Currently obsessed with the intersection of AI &amp; design</tspan>
  </text>
  
  <!-- Corner accent -->
  <path d="M 680 10 L 690 10 L 690 20" stroke="#D97706" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 680 150 L 690 150 L 690 140" stroke="#D97706" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
