<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 24" width="800" height="24">
  <defs>
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#D97706;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Main line -->
  <line x1="0" y1="12" x2="800" y2="12" stroke="url(#sepGrad)" stroke-width="1"/>
  
  <!-- Center diamond -->
  <rect x="396" y="8" width="8" height="8" fill="#D97706" opacity="0.7" transform="rotate(45 400 12)">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Small dots on sides -->
  <circle cx="350" cy="12" r="1.5" fill="#D97706" opacity="0.3"/>
  <circle cx="450" cy="12" r="1.5" fill="#D97706" opacity="0.3"/>
  
  <!-- Animated sweep -->
  <circle cx="0" cy="12" r="2" fill="#D97706" opacity="0.6">
    <animate attributeName="cx" values="0;800;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
