<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <!-- Background -->
  <rect width="800" height="60" fill="#0A0A0A" rx="8"/>
  
  <!-- Top separator line -->
  <line x1="40" y1="20" x2="760" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Left text -->
  <text x="40" y="42" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#333333">
    designed with precision
  </text>
  
  <!-- Center decorative element -->
  <rect x="396" y="38" width="8" height="8" fill="#D97706" opacity="0.3" transform="rotate(45 400 42)"/>
  
  <!-- Right text -->
  <text x="620" y="42" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#333333">
    © 2026 arsenio
  </text>
  
  <!-- Animated dot -->
  <circle cx="800" cy="42" r="1.5" fill="#D97706" opacity="0.5">
    <animate attributeName="cx" values="0;800;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
