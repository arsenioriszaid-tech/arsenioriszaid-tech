<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="220" fill="url(#cardBg)" rx="8" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Header -->
  <text x="30" y="30" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#D97706" letter-spacing="2">// TECH STACK</text>
  
  <!-- Grid layout -->
  <!-- Row 1 -->
  <rect x="30" y="50" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="50" y="80" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ Next.js</text>
  <text x="50" y="96" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Framework</text>
  
  <rect x="190" y="50" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="210" y="80" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ React</text>
  <text x="210" y="96" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Library</text>
  
  <rect x="350" y="50" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="370" y="80" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ TypeScript</text>
  <text x="370" y="96" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Language</text>
  
  <rect x="510" y="50" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="530" y="80" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ Tailwind</text>
  <text x="530" y="96" font-family="'SF Mono', monospace" font-size="9" fill="#555555">CSS Framework</text>
  
  <!-- Row 2 -->
  <rect x="30" y="125" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="50" y="155" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ Framer</text>
  <text x="50" y="171" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Motion</text>
  
  <rect x="190" y="125" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="210" y="155" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ Node.js</text>
  <text x="210" y="171" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Runtime</text>
  
  <rect x="350" y="125" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="370" y="155" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ Git</text>
  <text x="370" y="171" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Version Control</text>
  
  <rect x="510" y="125" width="145" height="60" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="530" y="155" font-family="'SF Mono', monospace" font-size="11" fill="#E5E7EB">⬡ AI/ML</text>
  <text x="530" y="171" font-family="'SF Mono', monospace" font-size="9" fill="#555555">Integration</text>
  
  <!-- Animated hover indicator -->
  <rect x="30" y="50" width="145" height="2" fill="#D97706" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
