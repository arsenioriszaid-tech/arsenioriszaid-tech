<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="800" height="50">
  <defs>
    <clipPath id="typewriter">
      <rect x="0" y="0" width="0" height="50">
        <animate attributeName="width" values="0;800;800" dur="4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="50" fill="#0A0A0A" rx="6" opacity="0.8"/>
  
  <!-- Terminal dots -->
  <circle cx="16" cy="14" r="3" fill="#FF5F57"/>
  <circle cx="28" cy="14" r="3" fill="#FFBD2E"/>
  <circle cx="40" cy="14" r="3" fill="#28CA42"/>
  
  <!-- Terminal title -->
  <text x="60" y="18" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#555555">arsenio.sh</text>
  
  <!-- Typing text -->
  <g clip-path="url(#typewriter)">
    <text x="16" y="40" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#D97706">
      > crafting beautiful interfaces, one component at a time_
    </text>
  </g>
  
  <!-- Blinking cursor -->
  <rect x="16" y="28" width="2" height="14" fill="#D97706">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
