<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" width="700" height="140">
  <!-- Background -->
  <rect width="700" height="140" fill="#0A0A0A" rx="8" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Header -->
  <text x="30" y="28" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#D97706" letter-spacing="2">// GITHUB STATS</text>
  
  <!-- Stats grid -->
  <!-- Total Commits -->
  <rect x="30" y="45" width="150" height="75" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="105" y="72" font-family="'SF Mono', monospace" font-size="20" fill="#FAFAFA" text-anchor="middle">0</text>
  <text x="105" y="92" font-family="'SF Mono', monospace" font-size="9" fill="#555555" text-anchor="middle">TOTAL COMMITS</text>
  <text x="105" y="108" font-family="'SF Mono', monospace" font-size="8" fill="#333333" text-anchor="middle">since 2024</text>
  
  <!-- PRs -->
  <rect x="195" y="45" width="150" height="75" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="270" y="72" font-family="'SF Mono', monospace" font-size="20" fill="#FAFAFA" text-anchor="middle">0</text>
  <text x="270" y="92" font-family="'SF Mono', monospace" font-size="9" fill="#555555" text-anchor="middle">PULL REQUESTS</text>
  <text x="270" y="108" font-family="'SF Mono', monospace" font-size="8" fill="#333333" text-anchor="middle">merged</text>
  
  <!-- Repos -->
  <rect x="360" y="45" width="150" height="75" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="435" y="72" font-family="'SF Mono', monospace" font-size="20" fill="#FAFAFA" text-anchor="middle">0</text>
  <text x="435" y="92" font-family="'SF Mono', monospace" font-size="9" fill="#555555" text-anchor="middle">REPOSITORIES</text>
  <text x="435" y="108" font-family="'SF Mono', monospace" font-size="8" fill="#333333" text-anchor="middle">public</text>
  
  <!-- Followers -->
  <rect x="525" y="45" width="150" height="75" fill="#0a0a0a" rx="4" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="600" y="72" font-family="'SF Mono', monospace" font-size="20" fill="#FAFAFA" text-anchor="middle">0</text>
  <text x="600" y="92" font-family="'SF Mono', monospace" font-size="9" fill="#555555" text-anchor="middle">FOLLOWERS</text>
  <text x="600" y="108" font-family="'SF Mono', monospace" font-size="8" fill="#333333" text-anchor="middle">worldwide</text>
</svg>
