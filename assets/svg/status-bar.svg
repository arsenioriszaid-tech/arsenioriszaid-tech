<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 40" width="700" height="40">
  <!-- Background -->
  <rect width="700" height="40" fill="#0A0A0A" rx="8" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Progress track -->
  <rect x="20" y="18" width="660" height="4" fill="#1a1a1a" rx="2"/>
  
  <!-- Animated progress fill -->
  <rect x="20" y="18" width="0" height="4" fill="#D97706" rx="2" opacity="0.8">
    <animate attributeName="width" values="0;660;660" dur="3s" fill="freeze"/>
  </rect>
  
  <!-- Label -->
  <text x="20" y="14" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#555555">STATUS</text>
  <text x="80" y="14" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#D97706">● ONLINE</text>
  
  <!-- Timestamp -->
  <text x="600" y="14" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#333333">v2026.07.21</text>
</svg>
