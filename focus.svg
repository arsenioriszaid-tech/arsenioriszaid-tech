<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="700" height="120">
  <!-- Background -->
  <rect width="700" height="120" fill="#0A0A0A" rx="8" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Header -->
  <text x="30" y="28" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#D97706" letter-spacing="2">// CURRENT FOCUS</text>
  
  <!-- Focus items with animated indicators -->
  <!-- Item 1 -->
  <circle cx="40" cy="55" r="3" fill="#D97706" opacity="0.8">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="55" y="59" font-family="'SF Mono', monospace" font-size="12" fill="#9CA3AF">Building scalable design systems with component-driven architecture</text>
  
  <!-- Item 2 -->
  <circle cx="40" cy="80" r="3" fill="#D97706" opacity="0.5">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <text x="55" y="84" font-family="'SF Mono', monospace" font-size="12" fill="#9CA3AF">Exploring AI-assisted development workflows and prompt engineering</text>
  
  <!-- Item 3 -->
  <circle cx="40" cy="105" r="3" fill="#D97706" opacity="0.3">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <text x="55" y="109" font-family="'SF Mono', monospace" font-size="12" fill="#9CA3AF">Mastering WebGL and creative coding for immersive web experiences</text>
</svg>
