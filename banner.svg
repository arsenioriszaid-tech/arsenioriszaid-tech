<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Orange glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    
    <!-- Scan line effect -->
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#D97706;stop-opacity:0.03" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" rx="8"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="200" fill="url(#grid)" rx="8"/>
  
  <!-- Glow effect -->
  <ellipse cx="600" cy="100" rx="500" ry="80" fill="url(#glow)"/>
  
  <!-- Left decorative line -->
  <line x1="40" y1="30" x2="40" y2="170" stroke="#D97706" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Right decorative line -->
  <line x1="1160" y1="30" x2="1160" y2="170" stroke="#D97706" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Terminal-style prompt symbol -->
  <text x="80" y="95" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#D97706" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
    ➜
  </text>
  
  <!-- Main title with typing animation -->
  <text x="105" y="95" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#FAFAFA" letter-spacing="2">
    ARSENIO
    <!-- Cursor blink -->
    <tspan fill="#D97706">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      ▌
    </tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="130" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#666666" letter-spacing="3">
    FRONTEND DEVELOPER · UI ENGINEER · CREATIVE CODER
  </text>
  
  <!-- Bottom accent line -->
  <rect x="80" y="150" width="0" height="1" fill="#D97706" opacity="0.5" rx="0.5">
    <animate attributeName="width" values="0;1040;1040" dur="2s" fill="freeze" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.5;0.5" dur="2s" fill="freeze" begin="0.5s"/>
  </rect>
  
  <!-- Small decorative dots -->
  <circle cx="80" cy="150" r="2" fill="#D97706" opacity="0.8"/>
  <circle cx="1120" cy="150" r="2" fill="#D97706" opacity="0.4"/>
  
  <!-- Corner accents -->
  <path d="M 20 20 L 40 20 M 20 20 L 20 40" stroke="#D97706" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M 1180 20 L 1160 20 M 1180 20 L 1180 40" stroke="#D97706" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M 20 180 L 40 180 M 20 180 L 20 160" stroke="#D97706" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M 1180 180 L 1160 180 M 1180 180 L 1180 160" stroke="#D97706" stroke-width="1.5" opacity="0.4" fill="none"/>
  
  <!-- Floating particles -->
  <circle cx="200" cy="50" r="1" fill="#D97706" opacity="0.3">
    <animate attributeName="cy" values="50;45;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="45" r="1.5" fill="#D97706" opacity="0.2">
    <animate attributeName="cy" values="45;55;45" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="170" r="1" fill="#D97706" opacity="0.4">
    <animate attributeName="cy" values="170;165;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Scanline sweep -->
  <rect x="0" y="-20" width="1200" height="40" fill="url(#scanline)" opacity="0.5">
    <animate attributeName="y" values="-20;200;200" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
